name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  debian:
    runs-on: ubuntu-latest
    container:
      image: debian:stable
    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential pkg-config libfuse3-dev fuse3 git ca-certificates

      - uses: actions/checkout@v5

      - name: Show toolchain
        run: |
          cat /etc/debian_version
          cc --version
          pkg-config --modversion fuse3
          uname -a

      - name: Build library
        run: make lib

      - name: Build helper objects (FUSE-independent)
        run: make objs

      - name: Build full binary + catvms
        run: make all

      - name: Smoke - help
        run: |
          ./fuse-ods2 -h || true
          ./catvms --help

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: fuse-ods2-debian
          path: |
            fuse-ods2
            catvms
          if-no-files-found: error

  e2e:
    needs: debian
    runs-on: ubuntu-latest
    # Privileged container is needed so /dev/fuse is usable inside.
    container:
      image: debian:stable
      options: >-
        --device /dev/fuse
        --cap-add SYS_ADMIN
        --security-opt apparmor:unconfined
    steps:
      - name: Install runtime + build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential pkg-config libfuse3-dev fuse3 \
            git ca-certificates perl \
            uuid-dev libedit-dev

      - uses: actions/checkout@v5

      - name: Build fuse-ods2 + catvms
        run: make all

      - name: Generate ODS-2 test image
        run: ./test/make_image.sh

      - name: Run smoke test
        run: ./test/smoke.sh

      - name: Show debug output on failure
        if: failure()
        run: |
          ls -la test/_out || true
          ./fuse-ods2 -h || true
          dmesg | tail -50 || true

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies (fuse-t)
        # fuse-t is a kext-less FUSE implementation for macOS that is
        # ABI-compatible with libfuse3.  macFUSE 5 ships libfuse3
        # headers too but with darwin-extended structs (fuse_darwin_attr,
        # divergent setxattr signature) that don't match upstream
        # libfuse3, so we use fuse-t instead -- it lets the same
        # ods2_ops.h that compiles on Linux compile here unchanged.
        run: |
          brew update
          brew install pkg-config
          brew tap macos-fuse-t/homebrew-cask
          brew install --cask fuse-t

      - name: Show toolchain
        run: |
          sw_vers
          cc --version
          uname -a
          pkg-config --modversion fuse3 2>/dev/null \
            || pkg-config --modversion fuse 2>/dev/null \
            || echo "no fuse pkg-config (will fail at link)"

      - name: Build library
        run: make lib

      - name: Build helper objects (FUSE-independent)
        run: make objs

      - name: Build full binary + catvms
        run: make all

      - name: Smoke - help
        run: |
          ./fuse-ods2 -h || true
          ./catvms --help

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: fuse-ods2-macos
          path: |
            fuse-ods2
            catvms
          if-no-files-found: error
