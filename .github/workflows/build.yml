name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  # Opt JS-based actions into Node.js 24 ahead of the default flip
  # (Node 20 is being deprecated on GitHub-hosted runners).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  debian:
    runs-on: ubuntu-latest
    container:
      image: debian:stable
    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential pkg-config libfuse3-dev fuse3 git ca-certificates

      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          cat /etc/debian_version
          cc --version
          pkg-config --modversion fuse3
          uname -a

      - name: Build library
        run: make lib

      - name: Build helper objects (FUSE-independent)
        run: make objs

      - name: Build full binary
        run: make bin

      - name: Smoke - help
        run: ./fuse-ods2 -h || true

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: fuse-ods2-debian
          path: fuse-ods2
          if-no-files-found: error
